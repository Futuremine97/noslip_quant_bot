<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
    background: #0b0c16; color: #e5e7eb; width: 440px; height: 580px;
    display: flex; flex-direction: column; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,.07);
    background: rgba(255,255,255,.02);
  }
  header h1 { font-size: 13px; font-weight: 700; letter-spacing: .2px; }
  header .meta { font-size: 11px; color: #6b7280; }
  .toolbar { display: flex; gap: 6px; padding: 8px 12px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,.05); }
  .btn {
    border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04);
    color: #d1d5db; border-radius: 8px; padding: 5px 9px; font-size: 11px; cursor: pointer;
  }
  .btn:hover { background: rgba(255,255,255,.09); }
  .btn.primary { background: linear-gradient(90deg,#8b5cf6,#6366f1); border: none; color: #fff; }
  .list { flex: 1; overflow-y: auto; padding: 8px 10px; }
  .group-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: #6b7280;
    margin: 12px 6px 6px; display: flex; align-items: center; gap: 6px;
  }
  .group-title .count { background: rgba(255,255,255,.08); border-radius: 6px; padding: 0 6px; color: #9ca3af; }
  .item {
    border: 1px solid rgba(255,255,255,.07); background: rgba(255,255,255,.03);
    border-radius: 12px; padding: 10px 11px; margin-bottom: 8px;
  }
  .item-head { display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #6b7280; flex: none; }
  .dot.active { background: #34d399; box-shadow: 0 0 7px #34d399aa; }
  .title { font-size: 12.5px; font-weight: 600; color: #fff; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sub { font-size: 10.5px; color: #6b7280; }
  .preview {
    margin-top: 6px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 10.5px; color: #9ca3af; background: #00000040; border-radius: 7px;
    padding: 5px 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row { display: flex; gap: 6px; margin-top: 8px; }
  .row input {
    flex: 1; background: #00000050; border: 1px solid rgba(255,255,255,.1); color: #fff;
    border-radius: 8px; padding: 5px 8px; font-size: 11px; outline: none; -webkit-user-select: text; user-select: text;
  }
  .row input:focus { border-color: #8b5cf6; }
  .mini { border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04); color: #cbd5e1;
    border-radius: 7px; padding: 4px 8px; font-size: 11px; cursor: pointer; }
  .mini:hover { background: rgba(255,255,255,.1); }
  .mini.kill:hover { border-color: #f43f5e66; color: #fda4af; background: #f43f5e1a; }
  .empty { text-align: center; color: #6b7280; font-size: 12px; padding: 40px 12px; }
  .note { font-size: 10.5px; color: #f59e0b; padding: 6px 12px; }
  footer { padding: 8px 12px; border-top: 1px solid rgba(255,255,255,.06); display: flex; justify-content: space-between; align-items: center; }
  footer a { color: #a78bfa; font-size: 11px; cursor: pointer; }
</style>
</head>
<body>
  <header>
    <h1>📟 터미널 통합 제어</h1>
    <span class="meta" id="meta">로딩 중…</span>
  </header>
  <div class="toolbar">
    <button class="btn" id="refresh">새로고침</button>
    <button class="btn" data-new="tmux">+ tmux</button>
    <button class="btn" data-new="Terminal">+ Terminal</button>
    <button class="btn" data-new="iTerm2">+ iTerm2</button>
  </div>
  <div class="list" id="list"><div class="empty">불러오는 중…</div></div>
  <footer>
    <a id="open-dash">대시보드 열기 →</a>
    <span class="meta" id="ts"></span>
  </footer>

<script>
  const api = window.terminalsAPI;
  const SOURCE_ICON = { tmux: '🟩', cmux: '🟦', Terminal: '⬛️', iTerm2: '🟪' };

  function el(tag, cls, txt) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (txt != null) e.textContent = txt;
    return e;
  }

  function renderItem(item) {
    const box = el('div', 'item');
    const head = el('div', 'item-head');
    head.appendChild(el('span', 'dot' + (item.active ? ' active' : '')));
    head.appendChild(el('span', 'title', item.title));
    head.appendChild(el('span', 'sub', item.subtitle || ''));
    box.appendChild(head);

    if (item.preview) box.appendChild(el('div', 'preview', item.preview));

    if (item.readOnly) {
      box.appendChild(el('div', 'note', item.subtitle || '제어 미연동'));
      return box;
    }

    const row = el('div', 'row');
    const input = el('input');
    input.placeholder = '명령 입력 후 Enter…';
    input.spellcheck = false;
    input.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter' && input.value.trim()) {
        const cmd = input.value;
        input.value = '';
        input.disabled = true;
        await api.send(item, cmd);
        input.disabled = false;
        setTimeout(load, 400);
      }
    });
    const focusBtn = el('button', 'mini', '포커스');
    focusBtn.onclick = () => api.focus(item);
    const killBtn = el('button', 'mini kill', '종료');
    killBtn.onclick = async () => { await api.kill(item); load(); };
    row.appendChild(input);
    row.appendChild(focusBtn);
    row.appendChild(killBtn);
    box.appendChild(row);
    return box;
  }

  async function load() {
    const list = document.getElementById('list');
    let data;
    try { data = await api.list(); }
    catch (e) { list.innerHTML = '<div class="empty">수집 실패: ' + e + '</div>'; return; }

    document.getElementById('meta').textContent = data.total + '개 세션';
    document.getElementById('ts').textContent = new Date(data.ts).toLocaleTimeString();
    list.innerHTML = '';

    if (data.total === 0) {
      list.innerHTML = '<div class="empty">열린 터미널 세션이 없습니다.<br>tmux/Terminal/iTerm2를 실행하거나 위에서 새로 만드세요.<br><br><span class="note">Terminal·iTerm 제어는 최초 1회 자동화 권한 동의가 필요합니다.</span></div>';
      return;
    }
    for (const g of data.groups) {
      if (!g.items.length) continue;
      const gt = el('div', 'group-title');
      gt.appendChild(document.createTextNode((SOURCE_ICON[g.source] || '') + ' ' + g.source));
      gt.appendChild(el('span', 'count', String(g.items.length)));
      list.appendChild(gt);
      for (const it of g.items) list.appendChild(renderItem(it));
    }
  }

  document.getElementById('refresh').onclick = load;
  document.getElementById('open-dash').onclick = () => api.openDashboard();
  document.querySelectorAll('[data-new]').forEach((b) => {
    b.onclick = async () => { await api.newSession(b.dataset.new); setTimeout(load, 500); };
  });
  window.addEventListener('focus', load);
  load();
</script>
</body>
</html>
