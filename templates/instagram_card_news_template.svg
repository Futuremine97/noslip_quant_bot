<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <style>
      .bg { fill: #F7F6F0; }
      .primary-orange { fill: #E85A24; }
      .secondary-green { fill: #2A7F54; }
      .text-dark { fill: #2E2D2B; }
      .text-muted { fill: #82877D; }
      .accent-box-bg { fill: #EAF5EE; }
      .code-box-bg { fill: #FCEEE9; }
      
      /* Opacity Colors for Abstract Graphics */
      .abstract-orange { fill: #E85A24; fill-opacity: 0.15; }
      .abstract-green { fill: #2A7F54; fill-opacity: 0.15; }
      .abstract-muted { fill: #82877D; fill-opacity: 0.15; }
      .abstract-green-stroke { stroke: #2A7F54; stroke-opacity: 0.15; fill: none; }
      
      /* Font Definitions */
      .font-title {
        font-family: 'Gmarket Sans', 'Gmarket Sans TTF', 'GmarketSansBold', 'Apple SD Gothic Neo', sans-serif;
        font-weight: 800;
      }
      .font-body {
        font-family: 'Pretendard', 'Pretendard Regular', 'Apple SD Gothic Neo', sans-serif;
        font-weight: 500;
      }
      .font-body-bold {
        font-family: 'Pretendard', 'Pretendard Bold', 'Apple SD Gothic Neo', sans-serif;
        font-weight: 700;
      }
      .font-mono {
        font-family: 'Pretendard', 'Courier New', monospace;
        font-weight: 600;
      }
    </style>
  </defs>

  <!-- Layer 1: Background -->
  <g id="layer-background">
    <rect class="bg" width="1080" height="1350"/>
    <!-- Giant Background Number (01) with 7% Opacity -->
    <text x="640" y="440" class="font-title" font-size="360" fill="#E85A24" fill-opacity="0.07">01</text>
  </g>

  <!-- Layer 2: Decorative Frames -->
  <g id="layer-decorative-frames">
    <!-- Top-Left Orange Bracket -->
    <path d="M 50 120 L 50 50 L 120 50" stroke="#E85A24" stroke-width="2" fill="none"/>
    <!-- Bottom-Right Green Bracket -->
    <path d="M 960 1300 L 1030 1300 L 1030 1230" stroke="#2A7F54" stroke-width="2" fill="none"/>
    <!-- Bottom Divider Line -->
    <line x1="100" y1="1170" x2="980" y2="1170" stroke="#82877D" stroke-width="1"/>
  </g>

  <!-- Layer 3: Step & Page Indicators -->
  <g id="layer-indicators">
    <!-- Step label -->
    <text x="100" y="140" class="font-body-bold" font-size="28" fill="#2A7F54">1 단계</text>
    <!-- Page indicator -->
    <text x="980" y="140" text-anchor="end" class="font-body" font-size="24" fill="#82877D">01 / 04</text>
    
    <!-- Swipe Button -->
    <text x="940" y="1210" text-anchor="end" class="font-body-bold" font-size="28" fill="#E85A24">SWIPE</text>
    <path d="M 955 1222 L 975 1222 M 968 1215 L 975 1222 L 968 1229" stroke="#E85A24" stroke-width="2" fill="none"/>

    <!-- Pagination Dots -->
    <g transform="translate(540, 1215)">
      <!-- Slide 1 Active (Green Ring) -->
      <circle cx="-45" cy="0" r="8" stroke="#2A7F54" stroke-width="3" fill="none"/>
      <!-- Slide 2, 3, 4 Inactive -->
      <circle cx="-15" cy="0" r="5" fill="#82877D"/>
      <circle cx="15" cy="0" r="5" fill="#82877D"/>
      <circle cx="45" cy="0" r="5" fill="#82877D"/>
    </g>
  </g>

  <!-- Layer 4: Titles -->
  <g id="layer-titles">
    <text x="100" y="230" class="font-title" font-size="76" fill="#E85A24">클로드 코드</text>
    <text x="100" y="315" class="font-title" font-size="76" fill="#2E2D2B">플러그인 설치하기</text>
    <rect x="100" y="415" width="220" height="6" class="secondary-green"/>
  </g>

  <!-- Layer 5: Commands & Codes -->
  <g id="layer-commands">
    <text x="100" y="460" class="font-body-bold" font-size="28" fill="#82877D">설치 커맨드 (마켓 등록 포함):</text>
    <!-- 2-Line Code Box -->
    <rect x="100" y="500" width="880" height="110" rx="6" class="code-box-bg"/>
    <text x="125" y="540" class="font-mono" font-size="20" fill="#2E2D2B">claude plugin marketplace add Futuremine97/noslip_quant_bot</text>
    <text x="125" y="580" class="font-mono" font-size="20" fill="#E85A24">claude plugin install noslip-quant@noslip-marketplace</text>
  </g>

  <!-- Layer 6: Main Body Paragraphs -->
  <g id="layer-body-text" transform="translate(100, 650)">
    <text x="0" y="40" class="font-body" font-size="32" fill="#2E2D2B" xml:space="preserve">터미널에서 플러그인 설치. 기능 설명은 <tspan class="font-body-bold" fill="#2A7F54">/기능</tspan>을 cli에 타이핑하고</text>
    <text x="0" y="90" class="font-body" font-size="32" fill="#2E2D2B" xml:space="preserve">여러 기능을 연결하려면 <tspan class="font-body-bold" fill="#2A7F54">텔레그램 봇</tspan>에 연결해서 자동 발송까지</text>
    <text x="0" y="140" class="font-body" font-size="32" fill="#2E2D2B">해보세요</text>
  </g>

  <!-- Layer 7: Bottom Highlight Accent Box -->
  <g id="layer-highlight-box" transform="translate(100, 930)">
    <rect class="accent-box-bg" width="880" height="180" rx="8"/>
    <rect class="secondary-green" x="0" y="0" width="8" height="180"/>
    <text x="40" y="105" class="font-body" font-size="32" fill="#2E2D2B" xml:space="preserve">많은 사용자들이 <tspan class="font-body-bold" fill="#E85A24">함께 할수록 </tspan> 더 <tspan class="font-body-bold" fill="#E85A24">커뮤니티</tspan>가 커져요</text>
  </g>

  <!-- Layer 8: 2D Geometric Abstract Graphic (15% Opacity Backdrop) -->
  <g id="layer-abstract-graphic" transform="translate(880, 860)">
    <!-- Tangerine sphere outline/fill -->
    <circle cx="0" cy="0" r="180" class="abstract-orange"/>
    <!-- Organic Leaf Curves -->
    <path d="M -140 -200 Q 20 -150 60 -20 Q -60 100 -220 -300" class="abstract-green-stroke" stroke-width="12"/>
    <path d="M -180 -220 Q 50 -160 100 0 Q -100 120 -260 -320" class="abstract-green-stroke" stroke-width="6"/>
  </g>
</svg>
