name: Build & Release Desktop App (dmg / exe)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build dmg
        working-directory: desktop
        run: |
          npm install --no-audit --no-fund
          npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: desktop/dist/*.dmg

  build-win:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build exe
        working-directory: desktop
        run: |
          npm install --no-audit --no-fund
          npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: desktop/dist/*.exe

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac-dmg/*.dmg
            artifacts/win-exe/*.exe
          generate_release_notes: true
          body: |
            ## No Slip Quant Desktop

            | OS | 파일 | 설치 |
            |---|---|---|
            | macOS (Apple Silicon/Intel) | `.dmg` | 열어서 Applications로 드래그 |
            | Windows 10/11 (x64) | `.exe` | 설치 마법사 실행 |

            앱은 로컬 대시보드(`npm run dev`, localhost:3000)에 자동 연결됩니다.
            서버가 꺼져 있으면 시작 안내 화면이 표시되고 5초 간격으로 자동 재연결합니다.
            원격 서버: `NOSLIP_DASHBOARD_URL` 환경변수로 지정.

            ⚠️ 코드서명 미적용: macOS는 첫 실행 시 우클릭→열기,
            Windows는 SmartScreen에서 "추가 정보→실행"이 필요할 수 있습니다.
